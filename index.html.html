<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>כרטיסיות לימוד | ועדת הסמכה למנהלי עבודה בבניה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4ff;
    --surface: #ffffff;
    --surface2: #e8eeff;
    --border: #b8c8f0;
    --accent: #1a3fc4;
    --accent2: #2ab8d4;
    --text: #0d1f6e;
    --text2: #4a6099;
    --green: #0f8a5f;
    --red: #c0392b;
    --card-front: #ffffff;
    --card-back: #eaf6fb;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #f0f4ff 0%, #dce8ff 100%);
    border-bottom: 1px solid var(--border);
    padding: 1.5rem 2rem 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .title-block h1 {
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: -0.8px;
    line-height: 1.2;
  }
  .title-block p {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text2);
    margin-top: 3px;
    letter-spacing: 0.2px;
  }
  .stats {
    display: flex;
    gap: 1rem;
    align-items: center;
  }
  .stat-pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.8rem;
    color: var(--text2);
  }
  .stat-pill span { color: var(--text); font-weight: 600; }
  .stat-pill.known span { color: var(--green); }
  .stat-pill.review span { color: var(--red); }

  /* PROGRESS BAR */
  .progress-bar-wrap {
    height: 3px;
    background: var(--border);
    border-radius: 3px;
    margin-bottom: 1rem;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #1a3fc4, #2ab8d4);
    border-radius: 3px;
    transition: width 0.3s ease;
  }

  /* CATEGORY FILTERS */
  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    overflow-x: auto;
    padding-bottom: 2px;
  }
  .filter-btn {
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 0.78rem;
    font-weight: 600;
    font-family: 'Heebo', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active {
    background: #1a3fc4;
    border-color: #1a3fc4;
    color: #ffffff;
    font-weight: 600;
  }
  .filter-btn .count {
    background: rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 1px 6px;
    font-size: 0.7rem;
    margin-right: 4px;
  }

  /* MAIN */
  .main {
    max-width: 760px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  /* CARD */
  .card-counter {
    text-align: center;
    font-size: 0.82rem;
    color: var(--text2);
    margin-bottom: 1rem;
    letter-spacing: 0.3px;
  }
  .card-area {
    perspective: 1000px;
    cursor: pointer;
    margin-bottom: 1.5rem;
    min-height: 280px;
  }
  .card-inner {
    position: relative;
    width: 100%;
    min-height: 280px;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
  }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 18px;
    padding: 0;
    display: flex;
    flex-direction: column;
    border: 1.5px solid var(--border);
    min-height: 280px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(26,63,196,0.07);
  }
  .card-cat-header {
    padding: 0.75rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1.5px solid var(--border);
  }
  .card-cat-label {
    font-size: 0.82rem;
    font-weight: 900;
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }
  .card-cat-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .card-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 1.8rem 2rem;
  }
  .card-front {
    background: var(--card-front);
  }
  .card-back {
    background: var(--card-back);
    transform: rotateY(180deg);
  }
  .cat-badge {
    font-size: 0.72rem;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 1.2rem;
    align-self: flex-start;
    letter-spacing: 0.3px;
  }
  .card-question {
    font-size: 1.2rem;
    font-weight: 700;
    line-height: 1.75;
    color: var(--text);
  }
  .card-answer {
    font-size: 1rem;
    line-height: 1.85;
    color: #1a3fc4;
    font-weight: 400;
  }
  .flip-hint {
    font-size: 0.72rem;
    color: var(--text2);
    margin-top: 1.4rem;
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--surface2);
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }
  .flip-hint::before { content: '↻'; font-size: 0.9rem; }

  /* EXAM badge */
  .exam-badge { background: #3d1a1a; color: #f46a6a; border: 1px solid #6b2b2b; }

  /* NAV BUTTONS */
  .nav {
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
  }
  .nav-btn {
    font-family: 'Heebo', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    padding: 11px 24px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    transition: all 0.18s;
    letter-spacing: 0.2px;
  }
  .nav-btn:hover { background: var(--surface2); border-color: var(--accent); }
  .nav-btn.known-btn {
    background: rgba(15,138,95,0.08);
    border-color: var(--green);
    color: var(--green);
  }
  .nav-btn.known-btn:hover { background: rgba(15,138,95,0.16); }
  .nav-btn.review-btn {
    background: rgba(192,57,43,0.08);
    border-color: var(--red);
    color: var(--red);
  }
  .nav-btn.review-btn:hover { background: rgba(192,57,43,0.16); }
  .nav-btn.shuffle-btn { font-size: 1rem; padding: 11px 16px; }

  /* DONE SCREEN */
  .done-screen {
    display: none;
    padding: 2rem 0;
  }
  .done-header {
    text-align: center;
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 2px solid var(--border);
  }
  .done-header h2 {
    font-size: 1.9rem;
    font-weight: 900;
    color: var(--accent);
    margin-bottom: 0.3rem;
    letter-spacing: -1px;
  }
  .done-header p { font-size: 0.92rem; color: var(--text2); font-weight: 600; }

  .grade-circle-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 2rem;
  }
  .grade-circle {
    width: 160px; height: 160px;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 6px solid;
    background: #fff;
    box-shadow: 0 8px 32px rgba(26,63,196,0.15);
  }
  .grade-circle.grade-a { border-color: #0f8a5f; background: #f0fff8; }
  .grade-circle.grade-b { border-color: #1a3fc4; background: #f0f4ff; }
  .grade-circle.grade-c { border-color: #2ab8d4; background: #f0faff; }
  .grade-circle.grade-d { border-color: #e67e22; background: #fff8f0; }
  .grade-circle.grade-f { border-color: #c0392b; background: #fff0f0; }
  .grade-pct {
    font-size: 2.6rem;
    font-weight: 900;
    line-height: 1;
    letter-spacing: -2px;
  }
  .grade-a .grade-pct { color: #0f8a5f; }
  .grade-b .grade-pct { color: #1a3fc4; }
  .grade-c .grade-pct { color: #2ab8d4; }
  .grade-d .grade-pct { color: #e67e22; }
  .grade-f .grade-pct { color: #c0392b; }
  .grade-label {
    font-size: 0.85rem;
    font-weight: 700;
    margin-top: 4px;
    letter-spacing: 1px;
  }
  .grade-a .grade-label { color: #0f8a5f; }
  .grade-b .grade-label { color: #1a3fc4; }
  .grade-c .grade-label { color: #2ab8d4; }
  .grade-d .grade-label { color: #e67e22; }
  .grade-f .grade-label { color: #c0392b; }
  .done-section-title {
    font-size: 0.78rem;
    font-weight: 900;
    color: var(--text2);
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border);
  }
  .grade-msg {
    font-size: 1.05rem;
    font-weight: 700;
    text-align: center;
    margin-bottom: 2rem;
    color: var(--text);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.9rem 1.2rem;
  }

  .done-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 2rem;
  }
  .done-stat {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 1.2rem 1rem;
    text-align: center;
    box-shadow: 0 2px 8px rgba(26,63,196,0.06);
  }
  .done-stat .ds-num { font-size: 2rem; font-weight: 900; line-height: 1.1; letter-spacing: -1px; }
  .done-stat .ds-lbl { font-size: 0.78rem; color: var(--text2); margin-top: 6px; font-weight: 700; letter-spacing: 0.3px; }
  .done-stat.g .ds-num { color: var(--green); }
  .done-stat.r .ds-num { color: var(--red); }
  .done-stat.t .ds-num { color: var(--accent); }

  .done-bar-wrap { margin-bottom: 1.5rem; }
  .done-bar-label { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text); margin-bottom: 6px; font-weight: 700; letter-spacing: 0.2px; }
  .done-bar-track { height: 10px; background: var(--surface2); border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
  .done-bar-fill { height: 100%; border-radius: 10px; transition: width 0.8s ease; }
  .done-bar-fill.green { background: linear-gradient(90deg, #0f8a5f, #2ab8d4); }
  .done-bar-fill.red { background: linear-gradient(90deg, #c0392b, #e67e22); }

  .done-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .done-actions .nav-btn { font-size: 0.9rem; padding: 12px 28px; }

  /* CATEGORY COLORS */
  .c-check { background: #e0f0ff; color: #1a5fa0; border: 1px solid #90c0e8; }
  .c-roles  { background: #e8e0ff; color: #3a1fa0; border: 1px solid #b0a0e8; }
  .c-law    { background: #e0eaff; color: #1a3fc4; border: 1px solid #90aae8; }
  .c-scaf   { background: #e0f8ff; color: #0a6080; border: 1px solid #80d0e8; }
  .c-height { background: #e0fff4; color: #0a6040; border: 1px solid #80e0c0; }
  .c-elec   { background: #fff8e0; color: #806000; border: 1px solid #e0c870; }
  .c-equip  { background: #e0f4ff; color: #0a4a80; border: 1px solid #80c4f0; }
  .c-safety { background: #ffe8e0; color: #801a0a; border: 1px solid #e0a090; }
  .c-excav  { background: #e8ffe0; color: #2a6010; border: 1px solid #a0d880; }
  .c-exam   { background: #f0e0ff; color: #600a80; border: 1px solid #c890e8; }
  .c-enforce{ background: #fff0e8; color: #7a2800; border: 1px solid #e8b090; }
  .c-official{ background: #e8f0ff; color: #1a3080; border: 1px solid #90a8e8; font-weight: 700; }
  .c-review  { background: #fff8e0; color: #7a5000; border: 1px solid #e8d080; font-weight: 700; }

  @media (max-width: 600px) {
    .header { padding: 1rem; }
    .main { padding: 1rem; }
    .card-face { padding: 1.5rem 1rem; }
    .card-question { font-size: 1rem; }
    .card-answer { font-size: 0.92rem; }
    .nav-btn { padding: 8px 14px; font-size: 0.8rem; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="title-block">
      <h1>🏗️ כרטיסיות לימוד</h1>
      <p>ועדת הסמכה למנהלי עבודה בבניה</p>
    </div>
    <div class="stats">
      <div class="stat-pill known">ידעתי: <span id="s-known">0</span></div>
      <div class="stat-pill review">לחזרה: <span id="s-review">0</span></div>
      <div class="stat-pill">כרטיסייה <span id="s-pos">1</span>/<span id="s-total">0</span></div>
    </div>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-bar" style="width:0%"></div></div>
  <div class="filters" id="filters"></div>
</div>

<div class="main">
  <div id="card-section">
    <div class="card-counter" id="card-counter"></div>
    <div class="card-area" onclick="flipCard()">
      <div class="card-inner" id="card-inner">
        <div class="card-face card-front">
          <div class="card-cat-header" id="front-header">
            <div class="card-cat-dot" id="front-dot"></div>
            <div class="card-cat-label" id="front-label"></div>
          </div>
          <div class="card-body">
            <div class="card-question" id="question"></div>
            <div class="flip-hint">לחץ לראות תשובה</div>
          </div>
        </div>
        <div class="card-face card-back">
          <div class="card-cat-header" id="back-header">
            <div class="card-cat-dot" id="back-dot"></div>
            <div class="card-cat-label" id="back-label"></div>
          </div>
          <div class="card-body">
            <div class="card-answer" id="answer"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="nav">
      <button class="nav-btn review-btn" onclick="markAndNext(false)">↩ לחזרה</button>
      <button class="nav-btn" onclick="prev()">◀ הקודם</button>
      <button class="nav-btn shuffle-btn" onclick="shuffle()" title="ערבב">🔀</button>
      <button class="nav-btn" onclick="next()">הבא ▶</button>
      <button class="nav-btn known-btn" onclick="markAndNext(true)">ידעתי ✓</button>
    </div>
  </div>
  <div class="done-screen" id="done-screen">
    <div class="done-header">
      <h2 id="done-title">🎉 כל הכבוד!</h2>
      <p id="done-subtitle">סיימת את כל הכרטיסיות בסט הזה</p>
    </div>
    <div class="grade-circle-wrap">
      <div class="grade-circle" id="grade-circle">
        <div class="grade-pct" id="grade-pct">0%</div>
        <div class="grade-label" id="grade-label">—</div>
      </div>
    </div>
    <div class="grade-msg" id="grade-msg"></div>
    <div class="done-stats">
      <div class="done-stat g"><div class="ds-num" id="done-known">0</div><div class="ds-lbl">ידעתי</div></div>
      <div class="done-stat r"><div class="ds-num" id="done-review">0</div><div class="ds-lbl">לחזרה</div></div>
      <div class="done-stat t"><div class="ds-num" id="done-total">0</div><div class="ds-lbl">סה"כ כרטיסיות</div></div>
    </div>
    <div class="done-section-title">פירוט תוצאות</div>
    <div class="done-bar-wrap">
      <div class="done-bar-label"><span>ידעתי</span><span id="bar-known-pct">0%</span></div>
      <div class="done-bar-track"><div class="done-bar-fill green" id="bar-known" style="width:0%"></div></div>
    </div>
    <div class="done-bar-wrap">
      <div class="done-bar-label"><span>לחזרה</span><span id="bar-review-pct">0%</span></div>
      <div class="done-bar-track"><div class="done-bar-fill red" id="bar-review" style="width:0%"></div></div>
    </div>
    <div class="done-actions">
      <button class="nav-btn" onclick="restart()">התחל מחדש 🔄</button>
      <button class="nav-btn review-btn" onclick="restartReview()">חזור על טעויות ↩</button>
    </div>
  </div>
</div>

<script>
const CATS = {
  'בדיקות תקופתיות': 'c-check',
  'תפקידים ומינויים': 'c-roles',
  'חוק ותקנות': 'c-law',
  'פיגומים': 'c-scaf',
  'עבודה בגובה': 'c-height',
  'חשמל': 'c-elec',
  'ציוד הרמה': 'c-equip',
  'בטיחות בעבודה': 'c-safety',
  'חפירה ודיפון': 'c-excav',
  'שאלות מבחן': 'c-exam',
  'צווים ואכיפה': 'c-enforce',
  'שאלות מבחן רשמיות': 'c-official',
  'חזרה למבחן': 'c-review',
};

const ALL = [
  // ── בדיקות תקופתיות ──
  {t:'בדיקות תקופתיות', q:'באיזו תדירות מנהל עבודה חייב לבדוק פיגום?', a:'עם ההתקנה לפני שימוש ◆ אחת ל-7 ימים ◆ אחרי הפסקה של 3 ימים ומעלה ◆ אחרי הפסקה בשל גשם או רוח ◆ אחרי כל שינוי בפיגום. כל בדיקה נרשמת בפנקס הכללי.'},
  {t:'בדיקות תקופתיות', q:'מתי נבדקות טפסות ע"י מנהל עבודה?', a:'לפני כל יציקה — לוודא יציבות, התאמה למטרה ועמידה בדרישות התקן. הבדיקה נרשמת בפנקס הכללי.'},
  {t:'בדיקות תקופתיות', q:'מתי מנהל עבודה חייב לבצע ביקורת בטיחות בחפירה?', a:'מדי יום לפני תחילת העבודה ◆ אחרי הפסקה של 7 ימים ◆ אחרי הפסקה בשל גשם או הצפה. תוצאות נרשמות בפנקס הכללי.'},
  {t:'בדיקות תקופתיות', q:'מתי נבדק קיר החיצוב ע"י מנהל עבודה?', a:'מדי יום לפני תחילת העבודה — מנהל העבודה מוודא את יציבות קיר החיצוב (סעיף 125).'},
  {t:'בדיקות תקופתיות', q:'באיזו תדירות נבדק מגדל הרמה ע"י מנהל עבודה?', a:'עם ההתקנה לפני שימוש ◆ לאחר שינוי במבנהו או הגבהתו ◆ אחת ל-7 ימים לפחות. הבדיקה נרשמת בפנקס הכללי (סעיף 152).'},
  {t:'בדיקות תקופתיות', q:'מי בודק פיגום ממוכן ובאיזו תדירות?', a:'בודק מוסמך: מיד אחרי ההתקנה ◆ אחרי כל תיקון במערכת ההרמה ◆ אחת ל-6 חודשים. כולל במת הרמה ניידת (סעיף 50).'},
  {t:'בדיקות תקופתיות', q:'מהי תדירות הבדיקה של עגורן צריח?', a:'בודק מוסמך: מיד אחרי הקמה ◆ אחרי כל שינוי במבנהו ◆ אחת ל-6 חודשים לפחות (תקנה 86).'},
  {t:'בדיקות תקופתיות', q:'מהי תדירות הבדיקה של מכונת הרמה (עגורן שאינו צריח)?', a:'אחת ל-14 חודשים לפחות, ע"י בודק מוסמך. התסקיר יימצא באתר בצמוד לפנקס הכללי (סעיף 81).'},
  {t:'בדיקות תקופתיות', q:'מתי נבדק קולט אוויר ובאיזו תדירות?', a:'לפני הכנסתו לשימוש הראשון ◆ ואחת ל-26 חודשים, ע"י בודק מוסמך (סעיף 116).'},
  {t:'בדיקות תקופתיות', q:'מהי תדירות הבדיקה של שרשראות, חבלים ואביזרי הרמה?', a:'אחת ל-6 חודשים לפחות, ע"י בודק מוסמך, המפרש את עומס העבודה הבטוח (סעיף 75).'},
  {t:'בדיקות תקופתיות', q:'מהי תדירות הבדיקה של מעלית באתר?', a:'כל 6 חודשים לפחות, ע"י בודק מוסמך. לא ישתמשו במעלית אלא אם נבדקה תוך 6 החודשים שקדמו לשימוש (סעיף 60).'},
  {t:'בדיקות תקופתיות', q:'מה ה"תסקיר" ומה חשיבותו?', a:'תסקיר = דו"ח בדיקה רשמי שכותב הבודק המוסמך. הוא מפרט את עומסי העבודה הבטוחים ומצב הציוד. חובה לשמרו באתר בצמוד לפנקס הכללי.'},

  // ── תפקידים ומינויים ──
  {t:'תפקידים ומינויים', q:'מי חייב למנות מנהל עבודה?', a:'מבצע הבניה — חייב למנות מנהל עבודה לכל עבודת בניה. יודיע למפקח עבודה אזורי וירשום שם ומען בפנקס הכללי (סעיף 2).'},
  {t:'תפקידים ומינויים', q:'מה אחריות מנהל העבודה לפי סעיף 5?', a:'חייב למלא אחר הוראות התקנות ולנקוט צעדים להבטחת ציות כל עובד — אלא אם החובה מוטלת במפורש על מבצע הבניה.'},
  {t:'תפקידים ומינויים', q:'מתי חובה למנות עוזר בטיחות באתר?', a:'מבנה מעל 7 מטרים ושטחו מעל 1,000 מ"ר ◆ או אתר עבודות בניה הנדסית שמפקח עבודה אזורי קבע שהוא אתר בניה (סעיף 25א).'},
  {t:'תפקידים ומינויים', q:'מה חובות הממונה על ארגז עזרה ראשונה?', a:'יהיה במקום כל שעות העבודה. באתר עם יותר מ-50 עובדים — חייב להיות מאומן במתן עזרה ראשונה. שמו נרשם בפנקס הכללי (סעיף 187).'},
  {t:'תפקידים ומינויים', q:'מה תנאי מינוי מפעיל מגדל הרמה?', a:'מנהל העבודה ממנה אותו ומדריכו לביצוע העבודה. שמו ומענו נרשמים בפנקס הכללי (סעיף 155).'},
  {t:'תפקידים ומינויים', q:'מה תנאי מינוי מפעיל מכונת הרמה?', a:'מלאו לו 18 שנים ◆ הודרך ע"י אדם בעל ניסיון בהפעלה ותחזוקה. המינוי יימצא במקום שבו מופעלת המכונה (סעיף 18).'},
  {t:'תפקידים ומינויים', q:'מהו "בונה מקצועי לפיגומים"?', a:'עבד 3 שנים+ בהקמת פיגומים ◆ עבר הכשרה לפי תוכנית שקבע מפקח עבודה ראשי ◆ עמד בהצלחה במבחן ◆ פרטיו פורסמו ע"י מפקח עבודה ראשי.'},
  {t:'תפקידים ומינויים', q:'מה סמכויות מפקח עבודה באתר הבניה?', a:'להיכנס בכל עת ◆ לבדוק ציוד, מכונות ותהליכים ◆ לחקור כל אדם ולרשום תשובות ◆ לבדוק פנקסים ומסמכים ולהעתיקם (סעיף 3).'},

  // ── חוק ותקנות ──
  {t:'חוק ותקנות', q:'מהו "מבצע בניה" לפי תקנות הבטיחות?', a:'קבלן ראשי או מזמין, המבצע את העבודה כולה או חלקה באמצעות עובדיו או קבלנים העובדים עבורו.'},
  {t:'חוק ותקנות', q:'מה ההבדל בין "קבלן ראשי" ל"קבלן משנה"?', a:'קבלן ראשי — מתקשר חוזית עם המזמין לבצע עבודת בניה. קבלן משנה — מתקשר חוזית עם הקבלן הראשי לבצע חלק מהעבודה.'},
  {t:'חוק ותקנות', q:'כמה זמן חייב מבצע הבניה לשמור את הפנקס הכללי?', a:'שנתיים לפחות מיום הרישום האחרון, פתוח לעיון מפקח (סעיף 200).'},
  {t:'חוק ותקנות', q:'מה מעמד רישום בפנקס הכללי לפי סעיף 241?', a:'קביל כראיה נגד מבצע הבניה על העובדות שצויינו בו. אי-רישום שנדרש = ראיה שהוראה לא קויימה!'},
  {t:'חוק ותקנות', q:'מה הגדרת "בניה הנדסית"?', a:'בניה של מסילות ברזל, מספן, נמל, מנהרה, גשר, מאגר, קו צינורות, מוביל מים, ביב — ועוד מבנים שנקבעו כך (סעיף 1 פקודת הבטיחות).'},
  {t:'חוק ותקנות', q:'מי יכול לעסוק כקבלן כוח אדם של עגורנאים?', a:'רק בעל היתר מיוחד משר העבודה, ורק ע"י הצבת עגורנאי מוסמך שהוא עובד של קבלן כוח האדם (חוק 2019).'},
  {t:'חוק ותקנות', q:'מה כוללות "עבודות תשתית ופיתוח"?', a:'עבודות עפר, חיצוב, קידוח ויציקת כלונסאות, דיפון, קירות תומכים, סלילת כבישים, אספלט, קווי תקשורת/חשמל/ביוב/מים/גז.'},
  {t:'חוק ותקנות', q:'מה חייב להיכלל בתיק נספחים לפנקס הכללי?', a:'תסקירי בדיקות בודק מוסמך (עגורן, מעלית, אביזרי הרמה) ◆ תכניות פיגומים/דיפונים/הריסות/טפסות מיוחדות ◆ היתרי חפירה ◆ תכנית ארגון בטיחותי ◆ תעודות בעלי מקצוע.'},

  // ── פיגומים ──
  {t:'פיגומים', q:'מהם סוגי הפיגומים העיקריים באתר בניה?', a:'פיגום צינורות (נקבי/צינורי) ◆ פיגום מסגרות ◆ פיגום קונסול ◆ פיגום תלוי ◆ פיגום ממוכן (נע) ◆ פיגום גישה/מעבר ◆ פיגום שיטתי (מגדל פיגום).'},
  {t:'פיגומים', q:'מה ההבדל בין פיגום נייח לפיגום ממוכן?', a:'פיגום נייח — עומד במקום קבוע, נבדק ע"י מנהל עבודה. פיגום ממוכן — נע לאורך הבניין (מסלול), נבדק ע"י בודק מוסמך אחת ל-6 חודשים וכולל במת הרמה ניידת.'},
  {t:'פיגומים', q:'מה דרישות הבטיחות לפיגום לפי התקנות?', a:'מעקה בגובה 90 ס"מ לפחות ◆ לוח בסיס רגל (קרש רגל) ◆ רוחב משטח עבודה מינימלי 60 ס"מ ◆ עומד בבדיקות תקופתיות ◆ הוקם ע"י בונה מקצועי לפיגומים.'},
  {t:'פיגומים', q:'מי מוסמך להקים ולפרק פיגום?', a:'בונה מקצועי לפיגומים — מי שעבד 3 שנים+ בהקמת פיגומים, עבר הכשרה ועמד במבחן שאישר מפקח עבודה ראשי.'},
  {t:'פיגומים', q:'מה "פיגום בתנאים מיוחדים" ומה דרוש?', a:'פיגום שאינו עומד בתנאי התקן הסטנדרטי — נדרשת תכנית מיוחדת (תקנה 71) המצורפת לפנקס הכללי.'},
  {t:'פיגומים', q:'מה יש לבדוק בבדיקת פיגום ע"י מנהל עבודה?', a:'יציבות הפיגום ◆ התאמה למטרה ◆ שלמות מעקות ◆ מצב לוחות רצפה ◆ עיגון לקיר ◆ מצב בסיסים ◆ העמסה תקינה ◆ אין שינויים לא מורשים.'},
  {t:'פיגומים', q:'מה נדרש לגבי הוראות יצרן פיגום?', a:'הוראות יצרן להקמה ושימוש בפיגום חייבות להיות מצורפות לתיק הנספחים של הפנקס הכללי (תקנה 16).'},

  // ── עבודה בגובה ──
  {t:'עבודה בגובה', q:'מהי הגדרת "עבודה בגובה" לפי התקנות?', a:'כל עבודה שבשלה עלול עובד ליפול לעומק העולה על 2 מטרים — כולל: עבודה ממשטח ללא גידור ◆ הטיית גוף מעל 45° מעבר למעקה ◆ עבודה מבימה מתרוממת/סל/פיגום ממוכן.'},
  {t:'עבודה בגובה', q:'מהם תנאי ההכרחיים להעסקת עובד בגובה?', a:'העובד בגיר (18+) ◆ הודרך ע"י מדריך מוסמך עבודה בגובה ◆ בעל אישור תקף חתום ע"י המדריך ◆ האישור מצורף לפנקס הכללי (סעיף 5).'},
  {t:'עבודה בגובה', q:'מהי "עבודת גלישה"?', a:'עבודה בגובה הדורשת גישה באמצעות תילוי מלא בחבלים — למעט פעילות ספורטיבית.'},
  {t:'עבודה בגובה', q:'אילו סוגי הדרכה בגובה רושמים בפנקס?', a:'על סולמות ◆ מסלים להרמת אדם ◆ מבימות הרמה מתרוממות ◆ מפיגומים ממוכנים ◆ במקום מוקף ◆ מפיגומים נייחים ◆ מגגות ◆ ממבנה קונסטרוקציה.'},

  // ── חשמל ──
  {t:'חשמל', q:'מהי תדירות הבדיקה של מפסק מגן?', a:'כל שבוע — לחיצת לחיץ, רשאי גם מי שאינו חשמלאי ◆ כל 3 חודשים — חשמלאי עם מכשיר בדיקה ◆ כל שנה — לוח ראשי/משני ע"י חשמלאי בודק.'},
  {t:'חשמל', q:'מה כוללת בדיקת לוח חשמל שנתית?', a:'בדיקת התנגדות בידוד ◆ בדיקת רציפות הארקה ◆ בדיקת התנגדות האלקטרודה הכללית של האדמה. ע"י חשמלאי בודק.'},
  {t:'חשמל', q:'מה נדרש לפני הפעלת מיתקן חשמלי ארעי חדש באתר?', a:'בדיקה ע"י חשמלאי בודק לפני הפעלה ראשונה — כולל בדיקת מפסקי מגן, לוחות חשמל, התנגדות בידוד, רציפות הארקה.'},
  {t:'חשמל', q:'מי רשאי לבדוק מפסק מגן בבדיקה שבועית?', a:'כל אדם — גם מי שאינו חשמלאי. הבדיקה מתבצעת ע"י לחיצה על לחיץ הבדיקה. תוצאות נרשמות ונשמרות ע"י בעל המיתקן.'},

  // ── ציוד הרמה ──
  {t:'ציוד הרמה', q:'מה ההבדל בין מגדל הרמה לעגורן צריח?', a:'מגדל הרמה — מבנה מתכת פשוט עם כננת, מרים חומרים אנכית בתוך האתר, נבדק ע"י מנהל עבודה כל 7 ימים. עגורן צריח — זרוע מסתובבת, טווח גדול, דורש עגורנאי מוסמך ובדיקת בודק מוסמך כל 6 חודשים.'},
  {t:'ציוד הרמה', q:'מה זה צמ"ה ואילו כלים נכללים?', a:'צמ"ה = ציוד מכני הנדסי. כולל: בולדוזר ◆ מחפר (שופל/אקסקבטור) ◆ מגרדה (גרייד) ◆ רולר (גלגלת דחיסה) ◆ מלגזה ◆ עגורן ◆ בובקט ◆ מחדיר כלונסאות.'},
  {t:'ציוד הרמה', q:'מה ההגדרה של "מכונת הרמה" לפי הפקודה?', a:'התקן הרמה, לרבות עגורן, קילון, תלת-רגל, כננת, מלגזה, גלגלת, מסוע עילי, מסילת כבל — וכל מכונה שיכולה להרים, להוריד או להחזיק עומס תלוי (סעיף 79).'},
  {t:'ציוד הרמה', q:'מה ההבדל בין כננת לגלגלת?', a:'כננת — מנגנון עם תוף (גליל) וכבל/חבל להרמת משאות, מופעלת מנועית. גלגלת — גלגל עם חריץ שדרכו עובר חבל/כבל, משמשת לשינוי כיוון הכוח, לא תמיד מנועית.'},
  {t:'ציוד הרמה', q:'מה תפקיד האתת (המאותת)?', a:'מדריך את העגורנאי/מפעיל בסימנים ידניים או קשר קולי — בעיקר כשהמפעיל אינו רואה את אזור ההורדה. נדרשת הסמכה מיוחדת לתפקיד.'},
  {t:'ציוד הרמה', q:'מה כללי הבטיחות המרכזיים בהפעלת מלגזה?', a:'רק בעל רישיון מלגזאי ◆ לא לנסוע עם מטען מורם גבוה ◆ אסור לאנשים מתחת למטען ◆ בדיקה לפני כל משמרת ◆ מהירות מותאמת לשטח.'},
  {t:'ציוד הרמה', q:'מה בודקים בבדיקה יומית של צמ"ה לפני עבודה?', a:'בלמים ומערכת היגוי ◆ רמות שמן ומים ◆ לחץ צמיגים/מצב שרשראות ◆ מערכת הידראולית ◆ אורות ואזעקת גיבוי ◆ ממגנים על חלקים נעים ◆ נזק גלוי לעין.'},
  {t:'ציוד הרמה', q:'אילו אביזרי הרמה דורשים בדיקה תקופתית?', a:'שרשראות, חבלים, כבלים, ווים, אבחות, לינגים, שקלים — כל אביזר המחבר בין מכונת ההרמה למטען. בדיקה כל 6 חודשים ע"י בודק מוסמך.'},

  // ── בטיחות בעבודה ──
  {t:'בטיחות בעבודה', q:'מה ציוד המגן האישי (ממ"א) הנדרש בבניה?', a:'קסדה (הגנת ראש) ◆ נעלי בטיחות עם חיזוז פלדה ◆ אפוד זוהר ◆ כפפות ◆ משקפי מגן בעבודות מסוימות ◆ רתמת בטיחות בעבודה בגובה ◆ אטמי אוזניים באזורי רעש.'},
  {t:'בטיחות בעבודה', q:'מה חובת ההדרכה לעובד חדש באתר בניה?', a:'כל עובד חייב לקבל הדרכת בטיחות לפני תחילת עבודתו. הדרכה נרשמת בטופס רישום הדרכה ומצורפת לפנקס הכללי. כולל: סיכונים באתר, ציוד מגן, נהלי חירום.'},
  {t:'בטיחות בעבודה', q:'מה אירוע מסוכן ומתי מדווחים עליו?', a:'אירוע שלא גרם לפגיעה אך עלול היה לגרום — כגון: קריסת פיגום, נפילת עגורן, ניתוק כבל הרמה. חובה לדווח מיד למפקח עבודה אזורי על גבי טופס רשמי.'},
  {t:'בטיחות בעבודה', q:'מתי חייבים לדווח על תאונת עבודה?', a:'3 ימי היעדרות+ — הודעה בטופס רשמי למפקח עבודה אזורי ◆ אשפוז — הודעה מיידית בטלפון ◆ פטירה או חשש לחיים — הודעה מיידית לפקח ולמשטרה, לא לשנות מצב זירת התאונה.'},
  {t:'בטיחות בעבודה', q:'מה אמצעי הבטיחות הנדרשים מפני נפילת חפצים?', a:'רשתות בטיחות ◆ קרשי רגל בפיגומים (מניעת גלישת כלים) ◆ גידור אזור תחת עבודות ◆ קסדה חובה ◆ לא להשאיר כלים בקצה פיגום/יציע ◆ שלטי אזהרה.'},
  {t:'בטיחות בעבודה', q:'מה כללי הבטיחות בעבודה עם בטון ויציקה?', a:'הגנה מפני התזת בטון (משקפים/מגן פנים) ◆ בדיקת טפסות לפני יציקה ◆ לא לדרוך על ברזל בלתי מוגן ◆ בדיקת יציבות הטפסות תחת עומס הבטון הרטוב.'},
  {t:'בטיחות בעבודה', q:'מה הסיכונים העיקריים באתר בניה?', a:'נפילה מגובה (הסיבה מספר 1 לתאונות) ◆ פגיעה מציוד הרמה ◆ קריסת חפירה ◆ חשמל ◆ נפילת חפצים ◆ אבק וחומרים מסוכנים ◆ רעש ◆ כלי עבודה ידניים.'},

  // ── חפירה ודיפון ──
  {t:'חפירה ודיפון', q:'מה ההגדרה של "דיפון" ומתי נדרש?', a:'דיפון = חיזוק דפנות החפירה למניעת קריסה. נדרש לפי עומק החפירה, סוג הקרקע והמרחק ממבנים. חפירה מעל 4 מ\' עומק — חובת תכנית דיפון מאושרת.'},
  {t:'חפירה ודיפון', q:'מהם סוגי הקרקע שמגדירים סכנת קריסה?', a:'קוד קרקע בפנקס: 1=סלע ◆ 2=אבן מדומה ◆ 3=צרורות ◆ 4=אדמה ◆ 5=חול. חול ואדמה רוויה — סכנת קריסה הגבוהה ביותר, דורשים דיפון מיידי.'},
  {t:'חפירה ודיפון', q:'מה תנאי הדיפון בחפירה לפי התקנות?', a:'חפירה מעל 1.5 מ\' — נדרשים אמצעי מניעת קריסה. מעל 4 מ\' — נדרשת תכנית דיפון מתכנן מוסמך (מצורפת לפנקס). חובה לבדוק יומי לפני עבודה.'},
  {t:'חפירה ודיפון', q:'מה צריך לבדוק בביקורת יומית של חפירה?', a:'יציבות דפנות ◆ מצב הדיפון ◆ נוכחות מים/ספיגה ◆ סדקים בקרקע סמוכה ◆ מרחק ממבנים/דרכים ◆ נוכחות עומסים (ציוד, חומרים) בקרבת קצה החפירה.'},
  {t:'חפירה ודיפון', q:'מה "היתר חפירה" ומי צריך אותו?', a:'לפני חפירה יש לקבל היתרי חפירה מחברות התשתיות: חשמל, מים, ביוב, תקשורת, גז — לאתר מיקום קווי תשתית קיימים ולמנוע פגיעה בהם. חובה לצרף לפנקס הכללי.'},
  {t:'חפירה ודיפון', q:'מה כללי הבטיחות בגשם/הצפה בחפירה?', a:'יש לעצור עבודה ◆ לא להיכנס לחפירה לפני בדיקת מנהל עבודה ◆ לבדוק יציבות דפנות ודיפון לאחר הגשם ◆ לשאוב מים אם יש הצפה ◆ לרשום בפנקס לפני חידוש עבודה.'},
  {t:'חפירה ודיפון', q:'מה הסכנות בחפירה סמוך למבנה קיים?', a:'השפעה על יסודות המבנה ◆ קריסת קיר עקב הפחתת משען ◆ חובה לתכנן דיפון מיוחד ◆ נדרשת חוות דעת מהנדס ◆ ייתכן צורך בעיגון (אנקרים) של הדיפון.'},

  // ── שאלות מבחן ──
  {t:'שאלות מבחן', q:'[מבחן] מנהל עבודה לא בדק פיגום 10 ימים. האם זה הפרה? מה הדרוש?', a:'כן — הפרה! חובה לבדוק פיגום אחת ל-7 ימים לפחות. גם אם לא הייתה הפסקה, הבדיקה חובה. יש לבצע בדיקה מיידית, לתעד בפנקס, ואם נמצא ליקוי — לרשום "בלתי כשיר" ולהפסיק שימוש עד לתיקון.'},
  {t:'שאלות מבחן', q:'[מבחן] עובד נפגע ואושפז. מה מנהל העבודה חייב לעשות?', a:'1. לוודא טיפול רפואי דחוף. 2. לא לשנות מצב זירת התאונה. 3. להודיע מיידית בטלפון למפקח עבודה אזורי. 4. לשלוח טופס הודעה רשמי. 5. לתעד בפנקס הכללי בחלק "אירועים מיוחדים".'},
  {t:'שאלות מבחן', q:'[מבחן] מה ההבדל בין בדיקת מנהל עבודה לבדיקת בודק מוסמך?', a:'מנהל עבודה — בדיקה ויזואלית שוטפת (יומית/שבועית) של פיגומים, חפירות, טפסות, מגדלי הרמה. בודק מוסמך — בדיקה מקצועית-הנדסית עם תסקיר רשמי לציוד הרמה, עגורנים, מעליות, אביזרי הרמה.'},
  {t:'שאלות מבחן', q:'[מבחן] באיזה מקרה עגורנאי יכול להפעיל עגורן צריח?', a:'רק אם: הוא בעל רישיון עגורנאי מוסמך ◆ העגורן עבר בדיקת בודק מוסמך (לאחר הקמה + כל 6 חודשים) ◆ יש תסקיר תקף ◆ מנהל העבודה אישר את ההפעלה.'},
  {t:'שאלות מבחן', q:'[מבחן] מה חובות מנהל העבודה ביום גשום?', a:'בדיקת חפירות ודיפון לפני חידוש עבודה ◆ בדיקת פיגומים אחרי הפסקה בשל גשם ◆ בדיקת קיר חיצוב ◆ בדיקת מגדל הרמה אם עצר בשל מזג האוויר ◆ תיעוד הכל בפנקס.'},
  {t:'שאלות מבחן', q:'[מבחן] מה ה"קוד כשירות" בפנקס הכללי ומה עושים בכל מקרה?', a:'1 = כשיר — ניתן לשימוש. 2 = טעון תיקון — מגבלות שימוש עד לתיקון. 3 = בלתי כשיר — אסור לשימוש, סמן באדום, הוצא מיד מהפעולה עד לתיקון ובדיקה מחדש.'},
  {t:'שאלות מבחן', q:'[מבחן] מתי מבצע בניה חייב להודיע על החלפת מנהל עבודה?', a:'מיד עם הפסקת שירותו של מנהל העבודה הקודם. חייב: להודיע מיד למפקח עבודה אזורי ◆ לרשום בפנקס הכללי שם ומען של מנהל העבודה החדש.'},
  {t:'שאלות מבחן', q:'[מבחן] פיגום עבר שינוי ע"י קבלן משנה ללא ידיעת מנהל העבודה. מה הדין?', a:'מנהל העבודה חייב לבדוק "אחרי כל שינוי שנעשה בפיגום שנודע לו עליו". עם שנודע לו — חייב בבדיקה מיידית וגם לבדוק מי ביצע השינוי ומדוע ללא אישור. שינוי לא מורשה = סכנה ביטחונית.'},
  {t:'שאלות מבחן', q:'[מבחן] כמה עובדים מחייבים ממונה מאומן בעזרה ראשונה?', a:'יותר מ-50 עובדים — הממונה על ארגז עזרה ראשונה חייב להיות מאומן במתן עזרה ראשונה. מתחת ל-50 — מספיק ממונה ללא הכשרה מיוחדת, אך הוא חייב להיות נוכח כל שעות העבודה.'},

  // ── צווים ואכיפה ──
  {t:'צווים ואכיפה', q:'מהו "צו שיפור" ומי מוסמך להוציאו?', a:'צו שיפור הוא הוראה בכתב של מפקח עבודה, המחייבת את המעביד לתקן ליקוי בטיחותי תוך פרק זמן שנקבע. מוציא אותו: מפקח עבודה אזורי. אין הפסקת עבודה מיידית, אך חובה לתקן במועד שנקבע.'},
  {t:'צווים ואכיפה', q:'מהו "צו איסור שימוש" ומתי מוציאים אותו?', a:'צו המחייב הפסקת שימוש מיידית בציוד, מכונה או אזור מסוים באתר — כאשר קיים סכנה מיידית לחיים. מופעל ע"י מפקח עבודה. אסור לחדש שימוש לפני תיקון הליקוי ואישור המפקח.'},
  {t:'צווים ואכיפה', q:'מהו "צו הפסקת עבודה" ומה תוצאותיו?', a:'צו המחייב הפסקה מיידית של כל העבודה באתר או חלקה — בשל סכנה חמורה לחיים. הפרת הצו = עבירה פלילית חמורה. ניתן לחדש עבודה רק לאחר אישור מפקח עבודה בכתב.'},
  {t:'צווים ואכיפה', q:'מה קורה אם מפרים צו של מפקח עבודה?', a:'הפרת צו = עבירה פלילית. ניתן להגיש כתב אישום נגד: מנהל העבודה ◆ מבצע הבניה ◆ בעל החברה. עונשים: קנסות כבדים ועד מאסר בפועל לפי חומרת ההפרה.'},
  {t:'צווים ואכיפה', q:'מה אחריות מנהל העבודה הפלילית?', a:'מנהל עבודה אחראי אישית פלילית להפרת תקנות הבטיחות. אינו יכול להסתתר מאחורי הוראות המעסיק. גם אם המעסיק הורה לו לעשות דבר מסוכן — אחריותו האישית נשמרת.'},
  {t:'צווים ואכיפה', q:'מה ההבדל בין צו שיפור לצו איסור שימוש?', a:'צו שיפור — יש זמן לתיקון, העבודה ממשיכה. צו איסור שימוש — הפסקה מיידית של הציוד/אזור הספציפי, אין המשך עד לתיקון ואישור. צו הפסקת עבודה — הפסקת כל האתר.'},
  {t:'צווים ואכיפה', q:'מה על מנהל עבודה לעשות כשמקבל צו שיפור?', a:'1. לקרוא את הצו ולהבין את הליקוי. 2. לתעד בפנקס הכללי. 3. לדווח מיד למבצע הבניה. 4. לתקן את הליקוי לפני המועד שנקבע בצו. 5. לוודא שהתיקון בוצע ולתעד. 6. לא להתחמק — אחריותו אישית.'},
  {t:'צווים ואכיפה', q:'מה סמכות מפקח עבודה לפי חוק ארגון הפיקוח?', a:'להיכנס לאתר בכל עת ◆ לבדוק כל ציוד ומסמך ◆ לחקור עובדים ולרשום עדויות ◆ להוציא צווים ◆ לתפוס ציוד מסוכן ◆ להגיש כתבי אישום. סירוב לשיתוף פעולה עם מפקח = עבירה פלילית.'},
  {t:'צווים ואכיפה', q:'[מבחן] מפקח עבודה הגיע לאתר ומצא פיגום ללא מעקה. מה יקרה?', a:'מפקח יוציא צו איסור שימוש בפיגום מיידי ◆ אם הסכנה חמורה — צו הפסקת עבודה כללי ◆ יירשם בפנקס הכללי בחלק "רישומי מפקח עבודה" ◆ ייתכן כתב אישום נגד מנהל העבודה ומבצע הבניה.'},
  {t:'צווים ואכיפה', q:'[מבחן] האם מנהל עבודה יכול לסרב לצו מפקח עבודה אם המעסיק הורה לו להמשיך?', a:'לא! מנהל העבודה אחראי אישית ופלילית. הוראת המעסיק אינה הגנה חוקית. עליו לציית לצו המפקח גם נגד הוראות המעסיק, ולדווח למפקח על לחץ המעסיק אם יש צורך.'},

  // ── שאלות מבחן רשמיות ──
  {t:'שאלות מבחן רשמיות', q:'בכל אתר בנייה חייב להיות ארגז עזרה ראשונה. מתי חייב להיות גם אדם מוסמך למתן עזרה ראשונה?', a:'תשובה נכונה: א — בכל אתר בנייה חייב להיות ארגז עזרה ראשונה, ובאתרי בנייה שבהם עובדים יותר מ-50 עובדים חייב להיות אדם המוסמך למתן עזרה ראשונה.'},
  {t:'שאלות מבחן רשמיות', q:'מי רשאי לפסול את מנהל העבודה מתפקידו מבחינת החוק?', a:'תשובה נכונה: ד — מפקח עבודה אזורי ומפקח עבודה ראשי.'},
  {t:'שאלות מבחן רשמיות', q:'איזה מפקח של אגף הפיקוח על העבודה רשאי להוציא צווי בטיחות?', a:'תשובה נכונה: ד — מפקח עבודה אזורי ומפקחים שהסמיך מפקח עבודה ראשי.'},
  {t:'שאלות מבחן רשמיות', q:'על תאונת עבודה שבה העובד נטול כושר עבודה ליותר מ-3 ימים, יש לדווח ל:', a:'תשובה נכונה: ד — מפקח עבודה אזורי. (לא מספיק "מפקח עבודה" סתם — חייב להיות אזורי.)'},
  {t:'שאלות מבחן רשמיות', q:'ביקורת בטיחות של חפירה יש לבצע:', a:'תשובה נכונה: ד — מדי יום לפני תחילת העבודה, לפני חידוש העבודה לאחר הפסקה של 7 ימים, ולאחר כל הפסקה בעקבות גשם או הצפה.'},
  {t:'שאלות מבחן רשמיות', q:'מה דורש החוק לגבי דיפון חפירה — מאיזה עומק?', a:'תשובה נכונה: ג — דיפון החפירה ייעשה כשעומק החפירה עולה על 1.2 מ\'. (לא 4 מ\' — זה לתכנית הנדסית.)'},
  {t:'שאלות מבחן רשמיות', q:'על-פי החוק יש לאבטח באמצעות גדר:', a:'תשובה נכונה: ד — כל חפירה, בלי קשר לעומקה.'},
  {t:'שאלות מבחן רשמיות', q:'מה המרחק המרבי בין מקום ביצוע העבודה בתוך תעלת חפירה לבין היציאה ממנה?', a:'תשובה נכונה: ג — לא יותר מ-20 מ\'.'},
  {t:'שאלות מבחן רשמיות', q:'על-פי החוק יש להתקין יציאה מסודרת מחפירה:', a:'תשובה נכונה: א — בכל חפירה שעומקה יותר מ-1.2 מ\'.'},
  {t:'שאלות מבחן רשמיות', q:'על-פי החוק, אילו מערכות טפסות חייבות בתכנון הנדסי?', a:'תשובה נכונה: ד — כל מערכת שגובהה יותר מ-4 מ\', עובי התקרה יותר מ-40 ס"מ, קורה שגובהה יותר מ-75 ס"מ, וכאשר ישנם תנאים מיוחדים.'},
  {t:'שאלות מבחן רשמיות', q:'מנהל העבודה יבדוק פיגומים: באיזו תדירות ובאילו נסיבות?', a:'תשובה נכונה: א — לאחר התקנת הפיגום ולפני תחילת השימוש, ולאחר מכן: פעם בשבוע לפחות, אחרי הפסקה של 3 ימים+, אחרי גשם/רוח, אחרי כל שינוי.'},
  {t:'שאלות מבחן רשמיות', q:'מה נדרש לסמן על תווית אביזר הרמה?', a:'תשובה נכונה: ד — מספר האביזר, העומס המותר, ותאריך הבדיקה האחרונה של בודק מוסמך.'},
  {t:'שאלות מבחן רשמיות', q:'מי האחראי לבטיחות באתר הבנייה כאשר מנהל עבודה נפסל מתפקידו?', a:'תשובה נכונה: א — מבצע הבנייה. כל עוד לא מונה מנהל עבודה חדש, האחריות על מבצע הבנייה.'},

// Build category filter buttons
function buildFilters() {
  const wrap = document.getElementById('filters');
  const counts = {};
  ALL.forEach(c => counts[c.t] = (counts[c.t]||0)+1);

  let html = `<button class="filter-btn active" onclick="setFilter('all',this)">הכל <span class="count">${ALL.length}</span></button>`;
  Object.keys(CATS).forEach(cat => {
    if (counts[cat]) {
      html += `<button class="filter-btn" onclick="setFilter('${cat}',this)">${cat} <span class="count">${counts[cat]}</span></button>`;
    }
  });
  wrap.innerHTML = html;
}

function setFilter(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = cat;
  filtered = cat === 'all' ? [...ALL] : ALL.filter(c => c.t === cat);
  idx = 0; known = 0; review = 0;
  updateStats();
  hideDone();
  showCard();
}

  'עבודה בגובה': '#0a6040',
  'חשמל': '#806000',
  'ציוד הרמה': '#0a4a80',
  'בטיחות בעבודה': '#801a0a',
  'חפירה ודיפון': '#2a6010',
  'שאלות מבחן': '#600a80',
  'צווים ואכיפה': '#7a2800',
  'שאלות מבחן רשמיות': '#1a3080',
  'חזרה למבחן': '#7a5000',
};
const CAT_BG = {
  'בדיקות תקופתיות': '#e0f0ff',
  'תפקידים ומינויים': '#e8e0ff',
  'חוק ותקנות': '#e0eaff',
  'פיגומים': '#e0f8ff',
  'עבודה בגובה': '#e0fff4',
  'חשמל': '#fff8e0',
  'ציוד הרמה': '#e0f4ff',
  'בטיחות בעבודה': '#ffe8e0',
  'חפירה ודיפון': '#e8ffe0',
  'שאלות מבחן': '#f0e0ff',
  'צווים ואכיפה': '#fff0e8',
  'שאלות מבחן רשמיות': '#e8f0ff',
  'חזרה למבחן': '#fff8e0',
};

function showCard() {
  if (idx >= filtered.length) { showDone(); return; }
  const c = filtered[idx];
  const dot = CAT_DOTS[c.t] || '#1a3fc4';
  const bg = CAT_BG[c.t] || '#e0eaff';

  ['front','back'].forEach(side => {
    document.getElementById(side+'-dot').style.background = dot;
    document.getElementById(side+'-label').textContent = c.t;
    document.getElementById(side+'-header').style.background = bg;
    document.getElementById(side+'-header').style.borderBottomColor = dot + '55';
  });

  document.getElementById('question').textContent = c.q;
  document.getElementById('answer').textContent = c.a;
  document.getElementById('card-inner').classList.remove('flipped');
  document.getElementById('card-counter').textContent = `כרטיסייה ${idx+1} מתוך ${filtered.length}`;
  document.getElementById('s-pos').textContent = idx+1;
  document.getElementById('s-total').textContent = filtered.length;
  const pct = ((idx+1)/filtered.length*100).toFixed(1);
  document.getElementById('prog-bar').style.width = pct+'%';
}

function flipCard() {
  document.getElementById('card-inner').classList.toggle('flipped');
}

function next() {
  if (idx < filtered.length - 1) { idx++; showCard(); }
}

function prev() {
  if (idx > 0) { idx--; showCard(); }
}

function markAndNext(didKnow) {
  if (!didKnow) reviewCards.push(filtered[idx]);
  if (didKnow) known++; else review++;
  updateStats();
  idx++;
  showCard();
}

function shuffle() {
  for (let i = filtered.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [filtered[i],filtered[j]] = [filtered[j],filtered[i]];
  }
  idx = 0; known = 0; review = 0; reviewCards = [];
  updateStats();
  hideDone();
  showCard();
}

function updateStats() {
  document.getElementById('s-known').textContent = known;
  document.getElementById('s-review').textContent = review;
}

function showDone() {
  document.getElementById('card-section').style.display = 'none';
  document.getElementById('done-screen').style.display = 'block';
  const total = filtered.length;
  const pct = total > 0 ? Math.round((known / total) * 100) : 0;

  document.getElementById('done-known').textContent = known;
  document.getElementById('done-review').textContent = review;
  document.getElementById('done-total').textContent = total;
  document.getElementById('grade-pct').textContent = pct + '%';
  document.getElementById('prog-bar').style.width = '100%';

  const knownPct = total > 0 ? Math.round(known/total*100) : 0;
  const reviewPct = total > 0 ? Math.round(review/total*100) : 0;
  document.getElementById('bar-known-pct').textContent = knownPct + '%';
  document.getElementById('bar-review-pct').textContent = reviewPct + '%';
  setTimeout(() => {
    document.getElementById('bar-known').style.width = knownPct + '%';
    document.getElementById('bar-review').style.width = reviewPct + '%';
  }, 100);

  let gradeClass, gradeLabel, gradeMsg, title;
  if (pct >= 90) {
    gradeClass = 'grade-a'; gradeLabel = 'מצוין';
    gradeMsg = '🏆 מוכן לוועדת ההסמכה! ביצועים יוצאי דופן.';
    title = '🎉 כל הכבוד!';
  } else if (pct >= 75) {
    gradeClass = 'grade-b'; gradeLabel = 'טוב מאוד';
    gradeMsg = '💪 עבודה מצוינת! עוד קצת חזרה ותהיה מוכן לחלוטין.';
    title = '👍 תוצאה טובה מאוד!';
  } else if (pct >= 60) {
    gradeClass = 'grade-c'; gradeLabel = 'טוב';
    gradeMsg = '📚 בסיס טוב! מומלץ לחזור על הנושאים שלא ידעת.';
    title = '📋 תוצאה סבירה';
  } else if (pct >= 45) {
    gradeClass = 'grade-d'; gradeLabel = 'עובר';
    gradeMsg = '⚠️ יש עוד מה ללמוד. חזור על הנושאים שלא ידעת.';
    title = '📖 צריך לחזור';
  } else {
    gradeClass = 'grade-f'; gradeLabel = 'נכשל';
    gradeMsg = '❌ יש עוד הרבה עבודה. המשך ללמוד — תצליח!';
    title = '📖 המשך ללמוד';
  }

  document.getElementById('done-title').textContent = title;
  document.getElementById('grade-circle').className = 'grade-circle ' + gradeClass;
  document.getElementById('grade-label').textContent = gradeLabel;
  document.getElementById('grade-msg').textContent = gradeMsg;

  const reviewBtn = document.querySelector('.done-actions .review-btn');
  if (reviewBtn) reviewBtn.style.display = reviewCards.length > 0 ? '' : 'none';
}

function hideDone() {
  document.getElementById('card-section').style.display = 'block';
  document.getElementById('done-screen').style.display = 'none';
}

function restart() {
  idx = 0; known = 0; review = 0; reviewCards = [];
  filtered = currentFilter === 'all' ? [...ALL] : ALL.filter(c => c.t === currentFilter);
  updateStats();
  hideDone();
  showCard();
}

function restartReview() {
  if (reviewCards.length === 0) return;
  filtered = [...reviewCards];
  idx = 0; known = 0; review = 0; reviewCards = [];
  updateStats();
  hideDone();
  showCard();
}

buildFilters();
showCard();
</script>
</body>
</html>
